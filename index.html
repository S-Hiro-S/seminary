<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神学校オンラインポータル | CLBJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark : #2c3614;
      --green      : #4a5d23;
      --brown      : #8b5a2b;
      --cream      : #fdfbf7;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 18px;
      background-color: var(--cream);
      color: #1a1a1a;
    }
    /* セクション切り替え */
    .section          { display: none; }
    .section.active   { display: block; }

    /* ナビ選択中 */
    .nav-active {
      background-color: var(--green) !important;
      color: white !important;
    }

    /* 時間割：本日列 */
    .today-col {
      background-color: #fff9e6 !important;
      box-shadow: inset 3px 0 0 var(--brown), inset -3px 0 0 var(--brown);
    }
    .today-header { background-color: var(--brown) !important; }

    /* 時間割：現在授業中セル */
    .live-cell {
      background-color: #fef3c7 !important;
      outline: 3px solid #d97706;
      outline-offset: -3px;
    }

    /* 放送中バッジ点滅 */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
    .blink { animation: blink 1.5s ease-in-out infinite; }

    /* ボタン押下フィードバック */
    .press:active { transform: scale(.96); }
  </style>
</head>
<body class="min-h-screen flex flex-col">

<!-- ========== ヘッダー ========== -->
<header class="bg-[#2c3614] text-white sticky top-0 z-50 shadow-lg">
  <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16 md:h-20">

    <button onclick="navigate('home')"
            class="text-xl md:text-2xl font-black tracking-wide hover:opacity-80 transition">
      ⛪ 神学校ポータル
    </button>

    <!-- PC ナビ -->
    <nav class="hidden md:flex gap-1">
      <button onclick="navigate('home')"      data-nav="home"
              class="nav-btn px-4 py-2 rounded-lg font-bold hover:bg-[#4a5d23] transition">
        🏠 ホーム
      </button>
      <button onclick="navigate('schedule')"  data-nav="schedule"
              class="nav-btn px-4 py-2 rounded-lg font-bold hover:bg-[#4a5d23] transition">
        🗓️ 時間割
      </button>
      <button onclick="navigate('archives')"  data-nav="archives"
              class="nav-btn px-4 py-2 rounded-lg font-bold hover:bg-[#4a5d23] transition">
        🎥 授業動画
      </button>
    </nav>

    <!-- モバイル ハンバーガー -->
    <button id="menu-toggle" class="md:hidden text-3xl px-2">☰</button>
  </div>

  <!-- モバイル メニュー -->
  <div id="mobile-menu" class="hidden md:hidden bg-[#4a5d23] divide-y divide-[#2c3614]">
    <button onclick="navigate('home')"      class="block w-full text-left px-6 py-4 font-bold text-lg">🏠 ホーム</button>
    <button onclick="navigate('schedule')"  class="block w-full text-left px-6 py-4 font-bold text-lg">🗓️ 時間割</button>
    <button onclick="navigate('archives')"  class="block w-full text-left px-6 py-4 font-bold text-lg">🎥 授業動画</button>
  </div>
</header>

<!-- ========== メインコンテンツ ========== -->
<main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8">

  <!-- ---- ホーム ---- -->
  <section id="section-home" class="section active space-y-8">

    <!-- ライブカード -->
    <div class="bg-white rounded-3xl shadow-xl border-2 border-[#4a5d23] p-6 md:p-10 relative">
      <span id="live-badge"
            class="hidden blink absolute top-4 right-4 bg-red-600 text-white text-sm font-bold px-3 py-1 rounded-full">
        ● 放送中
      </span>

      <p id="now-time"    class="text-[#4a5d23] font-bold text-base mb-2"></p>
      <h2 id="now-subject" class="text-2xl md:text-4xl font-black text-[#2c3614] mb-2 leading-tight">
        現在は授業時間外です
      </h2>
      <p id="now-teacher" class="text-gray-500 text-lg mb-6"></p>

      <!-- 授業中ボタン -->
      <div id="live-actions" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <button id="zoom-btn"
                class="press flex items-center justify-center gap-3
                       bg-[#4a5d23] hover:bg-[#2c3614] text-white
                       p-5 rounded-2xl font-bold text-xl transition">
          <i class="fa-solid fa-video"></i> Zoomで参加する
        </button>
        <button onclick="navigate('materials')"
                class="press flex items-center justify-center gap-3
                       bg-[#8b5a2b] hover:bg-[#6b4422] text-white
                       p-5 rounded-2xl font-bold text-xl transition">
          <i class="fa-solid fa-folder-open"></i> この授業の資料
        </button>
      </div>

      <!-- 授業外ヒント -->
      <div id="off-hint"
           class="p-4 bg-[#fdfbf7] rounded-xl border border-[#4a5d23]/20 text-gray-600 text-base">
        ⏳ 本日の予定は「時間割」または「授業資料」からご確認ください。
      </div>
    </div>

    <!-- お知らせ -->
    <div class="bg-white rounded-3xl shadow border border-gray-100 p-6 md:p-8">
      <h3 class="text-xl font-bold text-[#2c3614] border-b-2 border-[#8b5a2b] pb-2 mb-6">
        📢 お知らせ
      </h3>
      <div id="announcements-list">
        <p class="text-gray-400">読み込み中...</p>
      </div>
    </div>
  </section>

  <!-- ---- 時間割 ---- -->
  <section id="section-schedule" class="section">
    <div class="bg-white rounded-3xl shadow border border-gray-100 p-6 md:p-8">
      <h1 class="text-2xl font-bold text-[#2c3614] border-b-4 border-[#8b5a2b] pb-3 mb-6">
        🗓️ 2026年度 前期時間割
      </h1>
      <div id="timetable-wrap" class="overflow-x-auto">
        <p class="text-gray-400">読み込み中...</p>
      </div>
    </div>
  </section>

  <!-- ---- 授業動画 ---- -->
  <section id="section-archives" class="section">
    <div class="bg-white rounded-3xl shadow border border-gray-100 p-6 md:p-8">
      <h1 class="text-2xl font-bold text-[#2c3614] border-b-4 border-[#8b5a2b] pb-3 mb-6">
        🎥 授業動画アーカイブ
      </h1>
      <div id="archives-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <p class="text-gray-400">読み込み中...</p>
      </div>
    </div>
  </section>

</main>

<!-- ========== フッター ========== -->
<footer class="bg-[#2c3614] text-white text-center py-8 mt-auto">
  <p class="font-bold text-lg">神学校オンラインポータル</p>
  <p class="text-gray-400 text-sm mt-1">日本ルーテル同胞教団（CLBJ）</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
